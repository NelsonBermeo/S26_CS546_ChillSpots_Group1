<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Form Demo</title>
</head>
<body>
  <main class="location">
    <h1>Location Page Demo</h1>
  <form method="POST" id="commentForm" action="/comment/{{_id}}"> <!-- Where the full link would be something like /reviews/locationId/comments/reviewId Im assuming, idrk -->
  <label id="commentFormLabel">Write Your Comment:</label>
  <br>
  <textarea id="commentTextInput" name="content" required minlength="1" maxlength="1000"></textarea>
  <br>
  <button type="submit">Post Comment</button>
  </form>
  </main>
</body>
</html>
